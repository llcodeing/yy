# 数据库连接（MySQL）
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=LLqbh@0626!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis 连接
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=LLqbh@0626!

# Kafka 连接（应用与 Kafka 同机，必须用 localhost）
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=demo-group
spring.kafka.consumer.auto-offset-reset=earliest

# 禁用 SQL 初始化，由 Flyway 管理
spring.sql.init.mode=never
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.repair-on-migrate=true

# 日志
logging.file.path=/opt/app/logs
