name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: List packaged files
      run: ls -la target/

    # ① 启动 ssh-agent 并加载私钥
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    # ② 信任服务器主机
    - name: Add server to known_hosts
      run: ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

    # ③ 直接使用 scp 上传（无需第三方 action）
    - name: Upload JAR to Server
      run: |
        scp target/demo-0.0.1-SNAPSHOT.jar ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/opt/app/

    # ④ 直接使用 ssh 重启应用（无需第三方 action）
    - name: Restart Application
      run: |
        ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'
          echo ">>> 重启应用服务 <<<"
          sudo systemctl restart demo.service
          echo ">>> 等待应用启动 ... <<<"
          sleep 10
          echo ">>> 检查服务状态 <<<"
          sudo systemctl status demo.service --no-pager
        EOF