#spring.application.name=demo
#server.port=9090
mybatis.configuration.map-underscore-to-camel-case=true
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.repair-on-migrate=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=123456

spring.kafka.properties.security.protocol=PLAINTEXT

spring.kafka.bootstrap-servers=39.96.8.16:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer



spring.kafka.consumer.group-id=demo-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# PageHelper
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=false
pagehelper.params=count=countSql
